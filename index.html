<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juelle Ashburn | JA.Dev Ent.</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* COLOR PALETTE FROM YOUR ART REFERENCE */
        :root {
            --bg-color: #FAF8F5;       /* Muted Soft Cream Base */
            --text-main: #242D27;      /* Clean Dark Spruce */
            --text-muted: #566159;     /* Soft Slate Green */
            --accent-warm: #D46A43;    /* Terracotta Orange */
            --accent-water: #8DB6C9;   /* Soft Sky/Water Blue */
            --lily-green: #5EA67A;     /* Fresh Lily Pad Green */
            --font-display: 'Playfair Display', 'Didot', 'Georgia', serif;
            --font-sans: 'Inter', 'Helvetica Neue', Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            line-height: 1.6;
            padding: 0 2rem;
            overflow-x: hidden;
        }

        /* NAVIGATION / LOGO */
        header {
            max-width: 1200px;
            margin: 2rem auto;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid rgba(36, 45, 39, 0.1);
            padding-bottom: 1.5rem;
        }

        .brand-logo h1 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 1px;
            line-height: 1.1;
        }

        .brand-logo span {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-warm);
            margin-top: 0.25rem;
        }

        .location-tag {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* INTERACTIVE HERO CONTAINER */
        .hero-container {
            max-width: 1200px;
            margin: 4rem auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .hero-text h2 {
            font-family: var(--font-display);
            font-size: clamp(2.2rem, 5vw, 3.8rem);
            font-weight: 400;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 2rem;
        }

        .hero-text p {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 3rem;
            max-width: 520px;
        }

        /* RECTANGULAR INTERACTIVE WATER WINDOW */
        .water-window {
            position: relative;
            width: 100%;
            height: 550px;
            background-color: #EBF3F5;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(36, 45, 39, 0.04);
            overflow: hidden;
            border: 1px solid rgba(141, 182, 201, 0.2);
        }

        #water-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .cta-button {
            display: inline-block;
            background-color: var(--text-main);
            color: var(--bg-color);
            padding: 1rem 2rem;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            background-color: var(--accent-warm);
            transform: translateY(-2px);
        }

        /* FOOTER / CONTACT */
        footer {
            max-width: 1200px;
            margin: 10rem auto 4rem auto;
            border-top: 1px solid rgba(36, 45, 39, 0.1);
            padding-top: 4rem;
            text-align: center;
        }

        footer h3 {
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 400;
            margin-bottom: 1rem;
        }

        footer p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .email-link {
            font-family: var(--font-display);
            font-size: 1.8rem;
            color: var(--text-main);
            text-decoration: none;
            border-bottom: 2px solid var(--accent-warm);
            padding-bottom: 0.25rem;
            transition: color 0.3s ease;
        }

        .email-link:hover {
            color: var(--accent-warm);
        }

        .social-links {
            margin-top: 3rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

            text-decoration
