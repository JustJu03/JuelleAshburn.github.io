<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juelle Ashburn | JA.Dev Ent.</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* BALANCED VIBRANT PALETTE */
        :root {
            --bg-color: #FAF8F5;       /* Muted Soft Cream Base */
            --text-main: #242D27;      /* Clean Dark Spruce */
            --text-muted: #566159;     /* Soft Slate Green */
            --accent-warm: #D46A43;    /* Terracotta Orange */
            --card-bg: #F4EFEA;        /* Warm Linen Card Backdrop */
            --font-display: 'Playfair Display', 'Didot', 'Georgia', serif;
            --font-sans: 'Inter', 'Helvetica Neue', Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth; /* Smooth scrolling experience */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            line-height: 1.6;
            padding: 0 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* NAVIGATION / LOGO */
        header {
            max-width: 1200px;
            margin: 2rem auto;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid rgba(36, 45, 39, 0.1);
            padding-bottom: 1.5rem;
        }

        .brand-logo h1 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 1px;
            line-height: 1.1;
        }

        .brand-logo span {
            display: block;
            font-family: var(--font-sans);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-warm);
            margin-top: 0.25rem;
        }

        .location-tag {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* HERO SECTION */
        .hero {
            max-width: 1200px;
            margin: 8rem auto;
            text-align: left;
        }

        .hero h2 {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 400;
            line-height: 1.1;
            letter-spacing: -1px;
            max-width: 900px;
            margin-bottom: 2rem;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 600px;
            margin-bottom: 3rem;
        }

        .cta-button {
            display: inline-block;
            background-color: var(--text-main);
            color: var(--bg-color);
            padding: 1rem 2rem;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            background-color: var(--accent-warm);
            transform: translateY(-2px);
        }

        /* PORTFOLIO GRID */
        .portfolio-section {
            max-width: 1200px;
            margin: 10rem auto 4rem auto;
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 4rem;
            border-bottom: 1px solid rgba(36, 45, 39, 0.1);
            padding-bottom: 0.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 4rem;
        }

        .project-card {
            display: flex;
            flex-direction: column;
            background-color: var(--card-bg);
            padding: 1.5rem;
            border: 1px solid rgba(212, 106, 67, 0.12); /* Subtle card framing border */
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(36, 45, 39, 0.015); /* Soft premium shadow */
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s ease;
        }

        .project-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(36, 45, 39, 0.05);
        }

        /* Editorial Staggered Layout Feature */
        .staggered-card {
            transform: translateY(30px);
        }
        .staggered-card:hover {
            transform: translateY(22px);
        }

        .image-container {
            width: 100%;
            height: 450px;
            overflow: hidden;
            background-color: #e5dfd5;
            margin-bottom: 1.5rem;
            border-radius: 2px;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), filter 0.4s ease;
        }

        /* Vivid Immersive Image Hover Filter */
        .project-card:hover .image-container img {
            transform: scale(1.05);
            filter: saturate(1.1) brightness(1.02);
        }
