<script>
        const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;

        const engine = Engine.create({ gravity: { y: 0.12 } }); // Slightly lighter gravity for bubble floatiness
        const world = engine.world;

        const canvas = document.getElementById('physics-canvas');
        const render = Render.create({
            canvas: canvas,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: 'transparent'
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        let staticObstacles = [];
        let bubbleElements = [];

        // Colors from your canvas reference palette (Green, Terracotta, Blue-Grey, Gold)
        const bubbleBaseColors = [
            { r: 94, g: 166, b: 122 }, 
            { r: 212, g: 106, b: 67 }, 
            { r: 141, g: 182, b: 201 },
            { r: 238, g: 201, b: 122 }
        ];

        function createTextObstacles() {
            staticObstacles.forEach(body => Composite.remove(world, body));
            staticObstacles = [];

            const elements = document.querySelectorAll('.physics-obstacle');
            elements.forEach(el => {
                const rect = el.getBoundingClientRect();
                const body = Bodies.rectangle(
                    rect.left + rect.width / 2,
                    rect.top + rect.height / 2,
                    rect.width,
                    rect.height,
                    { isStatic: true, render: { visible: false } }
                );
                staticObstacles.push(body);
            });
            Composite.add(world, staticObstacles);
        }

        function resetBubble(bubble) {
            Matter.Body.setPosition(bubble, {
                x: Math.random() * window.innerWidth,
                y: Math.random() * -200 - 50
            });
            // Give them a tiny random sway velocity when respawning
            Matter.Body.setVelocity(bubble, { x: (Math.random() - 0.5) * 1.5, y: Math.random() * 1 });
        }

        function spawnBubbles() {
            for (let i = 0; i < 25; i++) {
                const radius = Math.random() * 18 + 16; // Perfectly sized bubbles
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * -600;
                const colorObj = bubbleBaseColors[Math.floor(Math.random() * bubbleBaseColors.length)];

                const bubble = Bodies.circle(x, y, radius, {
                    restitution: 0.85,
                    friction: 0.01,
                    frictionAir: 0.02, // Adds a little air resistance so they drift naturally
                    label: 'bubble',
                    plugin: {
                        // Custom data for rendering gradients and highlight shines
                        bubbleTheme: {
                            color: colorObj,
                            seed: Math.random() * 100 // For unique wobble speeds
                        }
                    },
                    render: { visible: false } // We will hand-draw the 3D bubble style over this instead
                });
                bubbleElements.push(bubble);
            }
            Composite.add(world, bubbleElements);
        }

        function triggerPopVisual(x, y) {
            const pop = document.createElement('div');
            pop.classList.add('pop-effect');
            pop.style.left = `${x}px`;
            pop.style.top = `${y}px`;
            document.body.appendChild(pop);
            setTimeout(() => pop.remove(), 300);
        }

        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach(pair => {
                let targetBubble = null;
                if (pair.bodyA.label === 'bubble') targetBubble = pair.bodyA;
                if (pair.bodyB.label === 'bubble') targetBubble = pair.bodyB;

                // 15% pop chance on collisions to keep it smooth and interactive
                if (targetBubble && Math.random() < 0.15) {
                    triggerPopVisual(targetBubble.position.x, targetBubble.position.y);
                    resetBubble(targetBubble);
                }
            });
        });

        Events.on(engine, 'afterUpdate', () => {
            bubbleElements.forEach(bubble => {
                if (bubble.position.y > window.innerHeight + 50) {
                    resetBubble(bubble);
                }
            });
        });

        // CUSTOM RENDERING OVERLAY FOR IRIDESCENT 3D BUBBLES
        Events.on(render, 'afterRender', () => {
            const context = render.context;
            const time = engine.timing.timestamp;
            
            bubbleElements.forEach(bubble => {
                const { x, y } = bubble.position;
                const radius = bubble.circleRadius;
                const theme = bubble.plugin.bubbleTheme;
                if (!theme) return;

                context.save();
                context.translate(x, y);

                // Add a subtle organic jelly-like wobble based on time and seed
                const wobbleX = 1 + Math.sin(time * 0.005 + theme.seed) * 0.04;
                const wobbleY = 1 + Math.cos(time * 0.005 + theme.seed) * 0.04;
                context.scale(wobbleX, wobbleY);

                // Create 3D spherical gradient matching your palette tone
                const gradient = context.createRadialGradient(
                    -radius * 0.3, -radius * 0.3, radius * 0.1,
                    0, 0, radius
                );
                
                const c = theme.color;
                // Translucent edge colors with an iridescent gleam appearance
                gradient.addColorStop(0, `rgba(255, 255, 255, 0.6)`);
                gradient.addColorStop(0.2, `rgba(${c.r + 20}, ${c.g + 20}, ${c.b + 20}, 0.35)`);
                gradient.addColorStop(0.8, `rgba(${c.r}, ${c.g}, ${c.b}, 0.2)`);
                gradient.addColorStop(1, `rgba(${c.r - 20}, ${c.g - 20}, ${c.b - 20}, 0.45)`);

                context.fillStyle = gradient;
                context.beginPath();
                context.arc(0, 0, radius, 0, 2 * Math.PI);
                context.fill();

                // Draw a beautiful white soap-bubble outer ring rim
                context.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                context.lineWidth = 1.5;
                context.stroke();

                // Add a glossy white reflection light highlight near the top left rim
                context.fillStyle = 'rgba(255, 255, 255, 0.6)';
                context.beginPath();
                context.arc(-radius * 0.4, -radius * 0.4, radius * 0.15, 0, 2 * Math.PI);
                context.fill();

                context.restore();
            });
        });

        window.addEventListener('load', () => {
            createTextObstacles();
            spawnBubbles();
        });

        window.addEventListener('resize', () => {
            render.bounds.max.x = window.innerWidth;
            render.bounds.max.y = window.innerHeight;
            render.options.width = window.innerWidth;
            render.options.height = window.innerHeight;
            createTextObstacles();
        });
    </script>
